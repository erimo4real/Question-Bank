<div id="form-container">
    <div class="max-w-4xl" x-data="questionForm()">
        <form method="post" class="space-y-6"
              hx-post hx-target="#form-container" hx-swap="innerHTML">
            {% csrf_token %}
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="px-6 py-5 border-b border-gray-100">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary-500 to-primary-600 flex items-center justify-center shadow-sm">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        </div>
                        <div>
                            <h3 class="text-lg font-bold text-gray-900">Question Details</h3>
                            <p class="text-sm text-gray-500">Enter the question text and metadata</p>
                        </div>
                    </div>
                </div>
                <div class="p-6 space-y-5">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wider">Question Text *</label>
                        <textarea name="question_text" rows="3" required
                                  class="block w-full px-4 py-3 border border-gray-200 rounded-xl text-gray-900 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 bg-gray-50 focus:bg-white transition-colors text-sm resize-none"
                                  placeholder="Enter your question here...">{{ question.question_text|default:'' }}</textarea>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wider">Question Type *</label>
                            <select name="question_type" x-model="qType" required
                                    class="block w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-primary-500 bg-gray-50 focus:bg-white transition-colors">
                                {% for val, label in type_choices %}
                                <option value="{{ val }}" {% if question.question_type == val %}selected{% endif %}>{{ label }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wider">Difficulty</label>
                            <select name="difficulty"
                                    class="block w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-primary-500 bg-gray-50 focus:bg-white transition-colors">
                                {% for val, label in difficulty_choices %}
                                <option value="{{ val }}" {% if question.difficulty == val %}selected{% endif %}>{{ label }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wider">Marks</label>
                            <input name="marks" type="number" min="1" value="{{ question.marks|default:'1' }}"
                                   class="block w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-primary-500 bg-gray-50 focus:bg-white transition-colors">
                        </div>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wider">Subject *</label>
                            <select name="subject" x-model="subjectId" @change="loadTopics()" required
                                    class="block w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-primary-500 bg-gray-50 focus:bg-white transition-colors">
                                <option value="">Select subject</option>
                                {% for s in subjects %}
                                <option value="{{ s.pk }}" {% if question.subject_id == s.pk %}selected{% endif %}>{{ s.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wider">Topic</label>
                            <select name="topic" x-model="selectedTopic"
                                    class="block w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-primary-500 bg-gray-50 focus:bg-white transition-colors">
                                <option value="">Select topic</option>
                                <template x-for="t in topicOptions" :key="t.id">
                                    <option :value="t.id" x-text="t.name" :selected="t.id === selectedTopic"></option>
                                </template>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wider">Class Level</label>
                            <select name="class_level"
                                    class="block w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-primary-500 bg-gray-50 focus:bg-white transition-colors">
                                <option value="">Select level (optional)</option>
                                {% for cl in class_levels %}
                                <option value="{{ cl.pk }}" {% if question.class_level_id == cl.pk %}selected{% endif %}>{{ cl.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden" x-show="['mcq','true_false','matching','ordering'].includes(qType)" x-cloak>
                <div class="px-6 py-5 border-b border-gray-100">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-blue-600 flex items-center justify-center shadow-sm">
                                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
                            </div>
                            <h3 class="text-lg font-bold text-gray-900">Answer Options</h3>
                        </div>
                        <button type="button" @click="options.push('')"
                                class="text-xs font-semibold text-primary-600 hover:text-primary-700 transition-colors">+ Add option</button>
                    </div>
                </div>
                <div class="p-6 space-y-3">
                    <template x-for="(opt, i) in options" :key="i">
                        <div class="flex items-center gap-3">
                            <span class="w-8 h-8 flex items-center justify-center bg-gradient-to-br from-gray-100 to-gray-200 rounded-lg text-xs font-bold text-gray-600" x-text="String.fromCharCode(65+i)"></span>
                            <input :name="'options'" x-model="options[i]"
                                   class="flex-1 px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-primary-500 bg-gray-50 focus:bg-white transition-colors"
                                   :placeholder="'Option ' + String.fromCharCode(65+i)">
                            <button type="button" @click="options.splice(i, 1)" x-show="options.length > 2"
                                    class="p-2 text-gray-400 hover:text-red-500 rounded-lg hover:bg-red-50 transition-all duration-200">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                            </button>
                        </div>
                    </template>
                </div>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="px-6 py-5 border-b border-gray-100">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-500 to-emerald-600 flex items-center justify-center shadow-sm">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        </div>
                        <h3 class="text-lg font-bold text-gray-900">Correct Answer</h3>
                    </div>
                </div>
                <div class="p-6">
                    <template x-if="['mcq','true_false','matching','ordering'].includes(qType)">
                        <div class="space-y-3">
                            <template x-for="(ans, i) in answers" :key="i">
                                <div class="flex items-center gap-3">
                                    <input type="checkbox" :value="ans" x-model="answers[i]"
                                           class="w-4 h-4 rounded-lg border-gray-300 text-emerald-600 focus:ring-emerald-500">
                                    <input :name="'correct_answer'" x-model="answers[i]"
                                           class="flex-1 px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-primary-500 bg-gray-50 focus:bg-white transition-colors"
                                           :placeholder="'Answer ' + (i+1)">
                                </div>
                            </template>
                        </div>
                    </template>
                    <template x-if="['fill_blank','essay','image'].includes(qType)">
                        <input name="correct_answer" type="text"
                               class="block w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-primary-500 bg-gray-50 focus:bg-white transition-colors"
                               placeholder="Correct answer or expected response"
                               value="{{ question.correct_answer.0|default:'' }}">
                    </template>
                </div>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="px-6 py-5 border-b border-gray-100">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-purple-500 to-purple-600 flex items-center justify-center shadow-sm">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        </div>
                        <h3 class="text-lg font-bold text-gray-900">Additional Information</h3>
                    </div>
                </div>
                <div class="p-6 space-y-5">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wider">Explanation</label>
                        <textarea name="explanation" rows="2"
                                  class="block w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-primary-500 bg-gray-50 focus:bg-white transition-colors resize-none"
                                  placeholder="Explain the correct answer...">{{ question.explanation|default:'' }}</textarea>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wider">Tags</label>
                            <input name="tags" type="text"
                                   class="block w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-primary-500 bg-gray-50 focus:bg-white transition-colors"
                                   value="{{ question.tags|join:','|default:'' }}" placeholder="algebra, equations, JSS1">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wider">Status</label>
                            <select name="status"
                                    class="block w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-primary-500 bg-gray-50 focus:bg-white transition-colors">
                                <option value="draft" {% if question.status == 'draft' %}selected{% endif %}>Draft</option>
                                <option value="published" {% if question.status == 'published' %}selected{% endif %}>Published</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button type="submit"
                        class="px-6 py-2.5 bg-gradient-to-r from-primary-600 to-primary-500 text-white text-sm font-bold rounded-xl hover:from-primary-700 hover:to-primary-600 shadow-lg shadow-primary-500/25 transition-all duration-200">
                    {% if question %}Save Changes{% else %}Create Question{% endif %}
                </button>
                <a href="{% url 'question-list' %}" class="px-4 py-2.5 text-sm font-semibold text-gray-500 hover:text-gray-700 border border-gray-200 rounded-xl hover:bg-gray-50 transition-all duration-200">Cancel</a>
            </div>
        </form>
    </div>

    <script>
    function questionForm() {
        return {
            qType: '{{ question.question_type|default:"mcq"|escapejs }}',
            subjectId: '{{ question.subject_id|default:""|escapejs }}',
            options: [{% for o in question.options %}'{{ o|escapejs }}'{% if not forloop.last %},{% endif %}{% endfor %}{% if not question.options %}'', '', '', ''{% endif %}],
            answers: [{% for a in question.correct_answer %}'{{ a|escapejs }}'{% if not forloop.last %},{% endif %}{% endfor %}{% if not question.correct_answer %}{% endif %}],
            topicOptions: [],
            selectedTopic: '{{ question.topic_id|default:""|escapejs }}',
            init() {
                if (this.subjectId) this.loadTopics();
            },
            async loadTopics() {
                if (!this.subjectId) { this.topicOptions = []; return; }
                const res = await fetch(`/api/subjects/topics-by-subject/?subject_id=${this.subjectId}`);
                this.topicOptions = await res.json();
                this.selectedTopic = '';
            }
        }
    }
    </script>
</div>
