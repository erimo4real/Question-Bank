{% extends "base.html" %}
{% load question_tags %}
{% block title %}Questions - Question Bank{% endblock %}
{% block page_title %}Questions{% endblock %}

{% block header_actions %}
<div class="flex items-center gap-2">
    <a href="{% url 'question-import' %}" class="inline-flex items-center gap-2 px-4 py-2.5 border border-gray-300 text-gray-700 text-sm font-semibold rounded-xl hover:bg-gray-50 transition-all duration-200">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
        <span class="hidden sm:inline">Import</span>
    </a>
    <a href="{% url 'question-create' %}"
       class="inline-flex items-center gap-2 px-4 py-2.5 bg-gradient-to-r from-primary-600 to-primary-500 text-white text-sm font-semibold rounded-xl hover:from-primary-700 hover:to-primary-600 shadow-lg shadow-primary-500/25 transition-all duration-200">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        <span class="hidden sm:inline">New Question</span>
    </a>
</div>
{% endblock %}

{% block content %}
{% include "questions/_list_content.html" %}
{% endblock %}
