{% extends "base.html" %}
{% block title %}Reset Link Sent - Question Bank{% endblock %}

{% block auth_content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-50 via-white to-primary-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full text-center">
        <div class="mx-auto w-14 h-14 bg-gradient-to-br from-brand-400 to-primary-500 rounded-2xl flex items-center justify-center shadow-xl shadow-primary-500/25 mb-4">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
        </div>
        <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">Check your email</h2>
        <p class="mt-2 text-sm text-gray-500">
            We've sent a password reset link to your email address.
            {% if dev_mode %}<br><span class="text-xs text-gray-400">(In dev mode, check the server console output)</span>{% endif %}
        </p>
        <a href="{% url 'login' %}" class="mt-8 inline-flex items-center gap-2 px-6 py-3 border border-gray-300 text-sm font-semibold rounded-xl text-gray-700 bg-white hover:bg-gray-50 shadow-sm transition-all duration-200">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
            Back to sign in
        </a>
    </div>
</div>
{% endblock %}
