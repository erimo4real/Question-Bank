<div id="profile-form">
    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden mb-6">
        <div class="px-6 py-5 border-b border-gray-100 flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary-500 to-primary-600 flex items-center justify-center shadow-sm">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            </div>
            <div>
                <h3 class="text-base font-semibold text-gray-900">Edit Profile</h3>
                <p class="text-xs text-gray-500">Update your personal information</p>
            </div>
        </div>

        <form method="POST" enctype="multipart/form-data" class="p-6"
              hx-post hx-target="#profile-form" hx-swap="innerHTML">
            {% csrf_token %}
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div class="md:col-span-2">
                    <label class="block text-xs font-medium text-gray-600 mb-3">Profile Photo</label>
                    <div class="flex items-center gap-5">
                        <div class="relative group" x-data="{ preview: '' }">
                            <div class="w-20 h-20 rounded-2xl overflow-hidden border-2 border-gray-200 shadow-sm">
                                <div x-show="!preview" class="w-full h-full bg-gradient-to-br from-primary-500 to-primary-600 flex items-center justify-center text-white text-xl font-bold">
                                    {{ request.user.first_name|first|default:"?" }}{{ request.user.last_name|first|default:"" }}
                                </div>
                                <img x-show="preview" :src="preview" alt="" class="w-full h-full object-cover" x-cloak>
                            </div>
                            <label class="absolute inset-0 bg-black/40 rounded-2xl flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer">
                                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                                <input type="file" name="avatar" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer"
                                       x-ref="avatarInput"
                                       @change="
                                           const file = $refs.avatarInput.files[0];
                                           if (file) {
                                               const reader = new FileReader();
                                               reader.onload = (e) => { preview = e.target.result; };
                                               reader.readAsDataURL(file);
                                           }
                                       ">
                            </label>
                        </div>
                        <div>
                            <p class="text-sm font-medium text-gray-900">Upload a photo</p>
                            <p class="text-xs text-gray-500 mb-2">JPG or PNG, max 5MB</p>
                            {% if request.user.avatar %}
                            <label class="inline-flex items-center gap-1.5 text-xs font-medium text-red-600 hover:text-red-700 cursor-pointer">
                                <input type="checkbox" name="remove_avatar" value="1" class="hidden">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                                Remove photo
                            </label>
                            {% endif %}
                        </div>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1.5">First Name</label>
                    <input type="text" name="first_name" value="{{ request.user.first_name }}"
                           class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm text-gray-900 placeholder-gray-400 focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1.5">Last Name</label>
                    <input type="text" name="last_name" value="{{ request.user.last_name }}"
                           class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm text-gray-900 placeholder-gray-400 focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1.5">Email</label>
                    <input type="email" value="{{ request.user.email }}" disabled
                           class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm text-gray-500 bg-gray-50 cursor-not-allowed">
                    <p class="text-[11px] text-gray-400 mt-1">Email cannot be changed</p>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1.5">Phone</label>
                    <input type="tel" name="phone" value="{{ request.user.phone|default:'' }}"
                           class="w-full px-4 py-2.5 rounded-xl border border-gray-200 text-sm text-gray-900 placeholder-gray-400 focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 outline-none transition-all"
                           placeholder="Enter phone number">
                </div>
            </div>
            <div class="mt-6 flex items-center gap-3">
                <a href="{% url 'profile' %}" class="px-5 py-2.5 rounded-xl border border-gray-200 text-sm font-medium text-gray-600 hover:bg-gray-50 transition-colors">
                    Cancel
                </a>
                <button type="submit" class="px-5 py-2.5 rounded-xl bg-gradient-to-r from-primary-600 to-primary-500 text-white text-sm font-semibold hover:from-primary-700 hover:to-primary-600 shadow-sm shadow-primary-500/25 transition-all">
                    Save Changes
                </button>
            </div>
        </form>
    </div>
</div>
