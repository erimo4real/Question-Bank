<div id="topics-{{ subject.pk }}" class="border-t border-gray-100 pt-4">
    <div class="flex items-center justify-between mb-2">
        <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Topics</p>
        <span class="text-xs font-bold text-primary-600 bg-primary-50 px-2 py-0.5 rounded-full">{{ topics.count }}</span>
    </div>
    <div class="flex flex-wrap gap-1.5">
        {% for topic in topics %}
        <span class="inline-flex items-center gap-1 px-2.5 py-1 bg-gray-50 text-gray-600 text-xs rounded-lg border border-gray-100">
            {{ topic.name }}
            <form method="post" action="{% url 'topic-inline-delete' subject.pk topic.pk %}" class="inline"
                  hx-post="{% url 'topic-inline-delete' subject.pk topic.pk %}" hx-target="#topics-{{ subject.pk }}" hx-swap="innerHTML">
                {% csrf_token %}
                <button class="text-gray-400 hover:text-red-500 ml-0.5 transition-colors">&times;</button>
            </form>
        </span>
        {% endfor %}
    </div>
    <form method="post" action="{% url 'topic-inline-create' subject.pk %}" class="mt-3 flex gap-2" x-data="{ show: false }"
          hx-post="{% url 'topic-inline-create' subject.pk %}" hx-target="#topics-{{ subject.pk }}" hx-swap="innerHTML">
        {% csrf_token %}
        <template x-if="show">
            <input name="name" type="text" placeholder="Topic name" required
                   class="flex-1 px-3 py-2 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 bg-gray-50 focus:bg-white transition-colors">
        </template>
        <template x-if="!show">
            <button type="button" @click="show = true"
                    class="inline-flex items-center gap-1 text-xs text-primary-600 hover:text-primary-700 font-semibold transition-colors">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                Add topic
            </button>
        </template>
        <template x-if="show">
            <div class="flex items-center gap-1">
                <button type="submit" class="px-3 py-1.5 bg-emerald-500 text-white text-xs font-semibold rounded-lg hover:bg-emerald-600 transition-all duration-200">Save</button>
                <button type="button" @click="show = false" class="px-3 py-1.5 bg-gray-200 text-gray-600 text-xs font-semibold rounded-lg hover:bg-gray-300 transition-all duration-200">Cancel</button>
            </div>
        </template>
    </form>
</div>
