<div id="form-container">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="px-6 py-5 border-b border-gray-100">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary-500 to-primary-600 flex items-center justify-center shadow-sm">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                </div>
                <div>
                    <h3 class="text-lg font-bold text-gray-900">{% if subject %}Edit Subject{% else %}Create New Subject{% endif %}</h3>
                    <p class="text-sm text-gray-500">{% if subject %}Update the subject details below{% else %}Fill in the details to create a new subject{% endif %}</p>
                </div>
            </div>
        </div>
        <form method="post" class="p-6 space-y-5"
              hx-post hx-target="#form-container" hx-swap="innerHTML">
            {% csrf_token %}
            <div>
                <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wider">Subject Name *</label>
                <input name="name" type="text" required value="{{ subject.name|default:'' }}"
                       class="block w-full px-4 py-3 border border-gray-200 rounded-xl text-gray-900 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 bg-gray-50 focus:bg-white transition-colors text-sm"
                       placeholder="e.g. Mathematics">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wider">Subject Code</label>
                <input name="code" type="text" value="{{ subject.code|default:'' }}"
                       class="block w-full px-4 py-3 border border-gray-200 rounded-xl text-gray-900 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 bg-gray-50 focus:bg-white transition-colors text-sm"
                       placeholder="e.g. MATH101">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wider">Description</label>
                <textarea name="description" rows="3"
                          class="block w-full px-4 py-3 border border-gray-200 rounded-xl text-gray-900 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 bg-gray-50 focus:bg-white transition-colors text-sm resize-none"
                          placeholder="Brief description of this subject">{{ subject.description|default:'' }}</textarea>
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wider">Class Level</label>
                <select name="class_level" class="block w-full px-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-primary-500 bg-gray-50 focus:bg-white transition-colors">
                    <option value="">Select class level (optional)</option>
                    {% for cl in class_levels %}
                    <option value="{{ cl.pk }}" {% if subject.class_level_id == cl.pk %}selected{% endif %}>{{ cl.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="flex items-center gap-3 pt-2">
                <button type="submit"
                        class="px-6 py-2.5 bg-gradient-to-r from-primary-600 to-primary-500 text-white text-sm font-bold rounded-xl hover:from-primary-700 hover:to-primary-600 shadow-lg shadow-primary-500/25 transition-all duration-200">
                    {% if subject %}Save Changes{% else %}Create Subject{% endif %}
                </button>
                <a href="{% url 'subject-list' %}" class="px-4 py-2.5 text-sm font-semibold text-gray-500 hover:text-gray-700 border border-gray-200 rounded-xl hover:bg-gray-50 transition-all duration-200">Cancel</a>
            </div>
        </form>
    </div>
</div>
